<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="An ecommerce website product card">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <title>Product Card</title>
    </head>
    <body>
        <div class="product-card">
            <div class="background-image">
                <img src="images/mac-lipstick.jpg" alt="A purple mac lipstick">
                <div class="image-overlay"></div>
            </div>
            <span class="badge sale">SALE</span>
            <span class="badge new">NEW</span>

            <button class="like">
                <i class="fa-solid fa-heart"></i>
            </button>

            <button class="quick-view">Quick View</button>

            <div class="product-data">
                <h3>Mac Powder Kiss Lipstick</h3>
                <p class="description">Weightless matte finish with a soft-blur effect</p>

                <div class="price">
                    <span class="new-price">$7.99</span>
                    <span class="old-price">$17.99</span>
                </div>
                <div class="rating">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star-half-stroke"></i>
                    <span class="rating-text">(4.5)</span>
                </div>
                <!-- add to cart button -->
                 <button class="add-to-cart">
                    <i class="fa-solid fa-cart-shopping"></i>
                    Add to Cart
                 </button>
            </div>
        </div>
    </body>
</html>
